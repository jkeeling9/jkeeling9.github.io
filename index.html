<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dotry.me</title>
    <style>
        :root {
            --glass-bg: rgba(20, 20, 25, 0.3);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #030305;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            perspective: 1000px;
        }

        /* Animated Atmospheric Background Mesh */
        .ambient-mesh {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(76, 29, 149, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(15, 118, 110, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 60% 20%, rgba(17, 24, 39, 0.5) 0%, transparent 50%);
            animation: drift 20s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-5%, -5%) rotate(5deg); }
        }

        /* Advanced Glassmorphism Utilities */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.5), 
                inset 0 1px 1px var(--glass-highlight);
            border-radius: 24px;
        }

        /* The Button */
        #try-btn {
            padding: 1.2rem 3rem;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-main);
            cursor: pointer;
            position: absolute;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        box-shadow 0.3s ease, border-color 0.3s ease;
            z-index: 10;
            overflow: hidden;
        }

        /* Button Hover Glare */
        #try-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-20deg);
            transition: left 0.5s ease;
        }

        #try-btn:hover::before {
            left: 150%;
        }

        #try-btn.surrender {
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.2), inset 0 1px 1px var(--glass-highlight);
            border-color: rgba(74, 222, 128, 0.4);
            transition: all 0.5s ease;
        }

        /* The Hidden Reveal Screen */
        #reveal-container {
            position: relative;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            transition: opacity 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            pointer-events: none;
        }

        #reveal-container.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        /* The Final Glass Card */
        .glass-card {
            padding: 4rem;
            max-width: 500px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Dynamic Mouse Glare on the Card */
        .glare {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 2;
        }

        .glass-card:hover .glare {
            opacity: 1;
        }

        .glass-card h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 3;
        }

        .glass-card p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            font-weight: 300;
            position: relative;
            z-index: 3;
        }
    </style>
</head>
<body>

    <div class="ambient-mesh"></div>

    <button id="try-btn" class="glass">Try Me</button>

    <div id="reveal-container">
        <div class="glass-card glass" id="card">
            <div class="glare" id="glare"></div>
            <h1>You win.</h1>
            <p>The real dotry.me is currently hidden behind the glass. Check back later.</p>
        </div>
    </div>

    <script>
        const btn = document.getElementById('try-btn');
        const revealContainer = document.getElementById('reveal-container');
        const card = document.getElementById('card');
        const glare = document.getElementById('glare');
        
        let dodges = 0;
        const maxDodges = 5; // Increased the difficulty slightly
        let isSurrendered = false;

        // Center button on load
        btn.style.left = `calc(50% - ${btn.offsetWidth / 2}px)`;
        btn.style.top = `calc(50% - ${btn.offsetHeight / 2}px)`;

        btn.addEventListener('mouseover', () => {
            if (dodges < maxDodges) {
                const maxX = window.innerWidth - btn.offsetWidth - 50;
                const maxY = window.innerHeight - btn.offsetHeight - 50;
                
                const randomX = Math.max(50, Math.floor(Math.random() * maxX));
                const randomY = Math.max(50, Math.floor(Math.random() * maxY));

                btn.style.left = `${randomX}px`;
                btn.style.top = `${randomY}px`;
                
                dodges++;
            } else if (!isSurrendered) {
                isSurrendered = true;
                btn.classList.add('surrender');
                btn.innerText = "Access Granted";
            }
        });

        btn.addEventListener('click', () => {
            if (isSurrendered) {
                // Fade out button, fade in the glass card
                btn.style.opacity = '0';
                btn.style.pointerEvents = 'none';
                revealContainer.classList.add('active');
            }
        });

        // Dynamic Glare Effect on the Glass Card
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left; // x position within the element
            const y = e.clientY - rect.top;  // y position within the element
            
            glare.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255, 255, 255, 0.15) 0%, transparent 60%)`;
        });
    </script>
</body>
</html>
