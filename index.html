<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dotry.me</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glow-color: #8b5cf6; /* A deep, electric purple */
            --text-main: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050505;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }

        /* Deep Ambient Background */
        .ambient-bg {
            position: absolute;
            inset: -50%;
            background: 
                radial-gradient(circle at 30% 20%, rgba(139, 92, 246, 0.15), transparent 40%),
                radial-gradient(circle at 70% 80%, rgba(14, 165, 233, 0.1), transparent 40%);
            filter: blur(80px);
            animation: pulse 10s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Ultra Glass Pill */
        #try-btn {
            position: absolute;
            padding: 1.2rem 3.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-main);
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), 
                        box-shadow 0.4s ease, border-color 0.4s ease;
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.3), /* Sharp top edge light */
                inset 0 -1px 1px rgba(0, 0, 0, 0.5); /* Deep bottom shadow */
        }

        #try-btn:hover {
            box-shadow: 
                0 0 40px rgba(139, 92, 246, 0.4),
                inset 0 1px 1px rgba(255, 255, 255, 0.4);
            border-color: rgba(139, 92, 246, 0.5);
        }

        #try-btn.surrender {
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.3), inset 0 1px 1px rgba(255,255,255,0.4);
            border-color: rgba(16, 185, 129, 0.5);
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(255,255,255,0.01) 100%);
        }

        /* Sparkle Particle System */
        .sparkle-container {
            position: absolute;
            pointer-events: none;
            inset: -20px;
            z-index: 11;
            overflow: visible;
        }

        .sparkle {
            position: absolute;
            width: 14px;
            height: 14px;
            opacity: 0;
            pointer-events: none;
            animation: sparkle-anim 800ms forwards cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .sparkle svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: #fff;
            stroke-width: 1.5;
            filter: drop-shadow(0 0 4px #fff) drop-shadow(0 0 8px var(--glow-color));
        }

        @keyframes sparkle-anim {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: scale(1.5) rotate(90deg) translateY(-20px); opacity: 0; }
        }

        /* Final Reveal Glass Panel */
        #reveal-container {
            position: relative;
            z-index: 5;
            opacity: 0;
            transform: scale(0.95) translateY(30px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        #reveal-container.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        .super-glass-card {
            padding: 4rem;
            max-width: 500px;
            text-align: center;
            border-radius: 30px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.6),
                inset 0 1px 1px rgba(255,255,255,0.4),
                inset 0 0 20px rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }

        /* Noise Texture for Realism */
        .super-glass-card::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.4;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        .super-glass-card h1 {
            font-size: 3rem;
            font-weight: 300;
            background: linear-gradient(to bottom right, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .super-glass-card p {
            color: #cbd5e1;
            line-height: 1.6;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <button id="try-btn">
        <div class="sparkle-container" id="sparkles"></div>
        <span id="btn-text">Try Me</span>
    </button>

    <div id="reveal-container">
        <div class="super-glass-card">
            <h1>System Breached.</h1>
            <p>The highly sensitive architecture of dotry.me has been temporarily secured behind military-grade CSS.</p>
        </div>
    </div>

    <script>
        const btn = document.getElementById('try-btn');
        const btnText = document.getElementById('btn-text');
        const revealContainer = document.getElementById('reveal-container');
        const sparkleContainer = document.getElementById('sparkles');
        
        let dodges = 0;
        const maxDodges = 6;
        let isSurrendered = false;

        btn.style.left = `calc(50% - ${btn.offsetWidth / 2}px)`;
        btn.style.top = `calc(50% - ${btn.offsetHeight / 2}px)`;

        // SVG Star Path
        const starSVG = `<svg viewBox="0 0 24 24"><path d="M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z"/></svg>`;

        function createSparkle(e) {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.innerHTML = starSVG;
            
            // Randomize position slightly around the cursor
            const rect = btn.getBoundingClientRect();
            let x, y;
            
            if (e) {
                x = e.clientX - rect.left + (Math.random() - 0.5) * 30;
                y = e.clientY - rect.top + (Math.random() - 0.5) * 30;
            } else {
                x = Math.random() * rect.width;
                y = Math.random() * rect.height;
            }

            sparkle.style.left = `${x}px`;
            sparkle.style.top = `${y}px`;
            
            // Randomize animation duration and size
            sparkle.style.animationDuration = `${500 + Math.random() * 500}ms`;
            sparkle.style.transform = `scale(${0.5 + Math.random()})`;

            sparkleContainer.appendChild(sparkle);

            // Clean up DOM
            setTimeout(() => {
                sparkle.remove();
            }, 1000);
        }

        // Generate sparkles on mousemove when button gives up
        btn.addEventListener('mousemove', (e) => {
            if (isSurrendered && Math.random() > 0.5) { // Throttle generation
                createSparkle(e);
            }
        });

        btn.addEventListener('mouseover', () => {
            if (dodges < maxDodges) {
                const maxX = window.innerWidth - btn.offsetWidth - 60;
                const maxY = window.innerHeight - btn.offsetHeight - 60;
                
                const randomX = Math.max(60, Math.floor(Math.random() * maxX));
                const randomY = Math.max(60, Math.floor(Math.random() * maxY));

                btn.style.left = `${randomX}px`;
                btn.style.top = `${randomY}px`;
                
                dodges++;
            } else if (!isSurrendered) {
                isSurrendered = true;
                btn.classList.add('surrender');
                btnText.innerText = "Execute";
                
                // Explode some sparkles when it surrenders
                for(let i = 0; i < 15; i++) {
                    setTimeout(() => createSparkle(), i * 50);
                }
            }
        });

        btn.addEventListener('click', () => {
            if (isSurrendered) {
                btn.style.opacity = '0';
                btn.style.pointerEvents = 'none';
                revealContainer.classList.add('active');
            }
        });
    </script>
</body>
</html>
